# DVC Pipeline Configuration for Customer Sentiment Analysis
# This pipeline orchestrates data preparation, feature engineering, and model training

stages:
  prepare:
    cmd: python src/data/prepare.py
    deps:
      - data/raw/restaurant.csv
      - src/data/prepare.py
    outs:
      - data/processed
    desc: "Load and prepare raw data"

  train:
    cmd: python src/models/train.py
    deps:
      - data/processed
      - src/models/train.py
      - config/model.yaml
    outs:
      - models/model.pkl
      - models/tokenizer.pkl
    metrics:
      - metrics.json:
          cache: false
    params:
      - config/model.yaml:
          - model.name
          - model.learning_rate
          - model.epochs
    desc: "Train sentiment analysis model"
